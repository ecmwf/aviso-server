application:
  host: "127.0.0.1"
  port: 8000
  base_url: "localhost:8000"
  static_files_path: "./src/static"
watch_endpoint:
  sse_heartbeat_interval_sec: 30
  connection_max_duration_sec: 3600
  replay_batch_size: 100
  max_historical_notifications: 10000
  replay_batch_delay_ms: 0
  concurrent_notification_processing: 20
notification_backend:
  kind: jetstream
  jetstream:
    nats_url: "nats://localhost:4222"
    max_messages: 100000000
    max_bytes: 1073741824
    storage_type: "file"
    retention_time: "30d"
    replicas: 1 # If this is set to a value greater than 1, the NATS server must be configured with a cluster.
    enable_auto_reconnect: true
#  kind: in_memory
#  in_memory:
#    max_history_per_topic: 10
#    max_topics: 1000
#    enable_metrics: true
logging:
  level: info
  format: json
notification_schema:
  dissemination:
    payload:
      type: ["String", "HashMap", "CloudEvent"]
      required: true
    topic:
      base: "diss"
      key_order: ["destination", "target", "class", "expver", "domain", "date", "time", "stream", "step"]
    storage_policy:
      retention_time: "7d"
      max_messages: 500000
      max_size: "2Gi"
      allow_duplicates: false
      compression: false
    identifier:
      class:
        - type: StringHandler
          max_length: 2
          required: true
      date:
        - type: DateHandler
          canonical_format: "%Y%m%d"
          required: false
      destination:
        - type: StringHandler
          required: true
      target:
        - type: StringHandler
          required: false
      domain:
        - type: EnumHandler
          values: ["a", "b", "c", "d", "e", "f", "g", "h", "i", "j", "k", "l", "m", "n", "o", "p", "q", "r", "s", "t", "u", "v", "w", "x", "y", "z"]
          required: false
      expver:
        - type: ExpverHandler
          default: "0001"
          required: false
      step:
        - type: IntHandler
          range: [0, 100000]
          required: false
      stream:
        - type: StringHandler
          required: false
      time:
        - type: TimeHandler
          required: false
  mars:
    payload:
      type: ["String", "NoneType"]
      required: false
    topic:
      base: "mars"
      key_order: ["class", "expver", "domain", "date", "time", "stream", "step"]
    storage_policy:
      retention_time: "14d"
      max_messages: 1000000
      max_size: "4Gi"
      allow_duplicates: false
      compression: true
    identifier:
      class:
        - type: StringHandler
          max_length: 2
          required: true
      date:
        - type: DateHandler
          canonical_format: "%Y%m%d"
          required: false
      domain:
        - type: EnumHandler
          values: ["a", "b", "c", "d", "e", "f", "g", "h", "i", "j", "k", "l", "m", "n", "o", "p", "q", "r", "s", "t", "u", "v", "w", "x", "y", "z"]
          required: false
      expver:
        - type: ExpverHandler
          default: "0001"
          required: false
      step:
        - type: IntHandler
          range: [0, 100000]
          required: false
      stream:
        - type: StringHandler
          required: false
      time:
        - type: TimeHandler
          required: false
  test_polygon:
    payload:
      type: ["String"]
      required: true
    topic:
      base: "polygon"
      key_order: ["date", "time"]
    storage_policy:
      retention_time: "3d"
      max_messages: 200000
      max_size: "1Gi"
      allow_duplicates: true
      compression: true
    identifier:
      date:
        - type: DateHandler
          canonical_format: "%Y%m%d"
          required: false
      time:
        - type: TimeHandler
          required: false
      polygon:
        - type: PolygonHandler
          required: true
